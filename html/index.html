<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金英杰 - 个人主页</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../scripts/homepage.js" defer></script>
</head>

<body>
  <div class="hp-page" id="hp-app">

    <!-- Header -->
    <header id="hp-header"></header>

    <!-- 项目经验 -->
    <section class="hp-section">
      <h2 class="hp-section-title"><i class="fa-solid fa-briefcase"></i> 项目经验</h2>
      <div class="hp-tabs" id="hp-tabs"></div>
      <div class="hp-cards" id="hp-cards">
        <div class="hp-loading"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
      </div>
    </section>

    <!-- 开源项目 -->
    <section class="hp-section">
      <h2 class="hp-section-title"><i class="fa-brands fa-github"></i> 开源项目</h2>
      <div id="hp-github-content">
        <div class="hp-loading"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
      </div>
    </section>

    <!-- 技能 -->
    <section class="hp-section">
      <h2 class="hp-section-title"><i class="fa-solid fa-code"></i> 技术栈</h2>
      <div class="hp-skills" id="hp-skills-content">
        <div class="hp-loading"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
      </div>
    </section>

    <!-- 教育经历 -->
    <section class="hp-section">
      <h2 class="hp-section-title"><i class="fa-solid fa-graduation-cap"></i> 教育经历</h2>
      <div id="hp-education-content">
        <div class="hp-loading"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="hp-footer">
      <p>&copy; 2026 金英杰 &middot; 数据驱动渲染 &middot; <a href="https://github.com/a869320750/MyHtmlResume" target="_blank">MyHtmlResume</a></p>
    </footer>
  </div>
</body>

</html>
